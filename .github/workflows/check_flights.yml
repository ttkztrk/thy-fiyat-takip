name: Ucus Fiyat Takip

on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 12 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch: {}

jobs:
  check-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - uses: actions/cache@v4
        with:
          path: /tmp/last_prices.json
          key: prices-v1
          restore-keys: prices-v1
      - run: python main.py
        env:
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_ADDRESS:       ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO:            ${{ secrets.EMAIL_TO }}
          THRESHOLD_OUTBOUND:  "200"
          THRESHOLD_INBOUND:   "200"
          PRICES_FILE:         "/tmp/last_prices.json"
      - uses: actions/cache/save@v4
        if: always()
        with:
          path: /tmp/last_prices.json
          key: prices-${{ github.run_id }}
